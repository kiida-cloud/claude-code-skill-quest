<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Skill Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .slide-up { animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .pop-in { animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-8px); } 40%,80% { transform: translateX(8px); } }

        .pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }
        @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 5px rgba(139,92,246,0.3); } 50% { box-shadow: 0 0 20px rgba(139,92,246,0.6); } }

        .confetti { position: fixed; pointer-events: none; z-index: 100; }
        .confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: confettiFall 1.5s ease-out forwards; }
        @keyframes confettiFall { 0% { opacity: 1; transform: translateY(0) rotate(0deg); } 100% { opacity: 0; transform: translateY(400px) rotate(720deg); } }

        .xp-float { animation: xpFloat 1.2s ease-out forwards; position: absolute; pointer-events: none; }
        @keyframes xpFloat { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-60px); } }

        .streak-fire { animation: fireGlow 0.6s ease-in-out infinite alternate; }
        @keyframes fireGlow { from { text-shadow: 0 0 4px #f97316; } to { text-shadow: 0 0 12px #ef4444, 0 0 20px #f97316; } }

        .level-up-overlay { animation: levelUpBurst 2s ease-out forwards; }
        @keyframes levelUpBurst { 0% { opacity: 0; transform: scale(0.3); } 20% { opacity: 1; transform: scale(1.1); } 40% { transform: scale(0.95); } 60% { transform: scale(1.02); } 80%,100% { opacity: 1; transform: scale(1); } }

        .stage-card { transition: all 0.3s ease; }
        .stage-card:not(.locked):hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .stage-card.locked { opacity: 0.5; filter: grayscale(0.5); cursor: not-allowed; }

        .option-btn { transition: all 0.2s ease; }
        .option-btn:not(:disabled):hover { transform: translateX(4px); }
        .option-btn.correct { background: linear-gradient(135deg, #10b981, #059669) !important; color: white !important; border-color: #059669 !important; }
        .option-btn.wrong { background: linear-gradient(135deg, #ef4444, #dc2626) !important; color: white !important; border-color: #dc2626 !important; }

        .progress-fill { transition: width 0.6s ease-out; }
        .xp-bar-fill { transition: width 0.8s ease-out; }

        .gradient-bg { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 30%, #4c1d95 60%, #581c87 100%); }
        .gradient-text { background: linear-gradient(135deg, #a78bfa, #c084fc, #e879f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .gradient-btn { background: linear-gradient(135deg, #7c3aed, #a855f7); }
        .gradient-btn:hover { background: linear-gradient(135deg, #6d28d9, #9333ea); }
    </style>
</head>
<body class="gradient-bg text-white min-h-screen">

    <div id="app" class="max-w-lg mx-auto min-h-screen flex flex-col">

        <!-- ========== TITLE SCREEN ========== -->
        <div id="screen-title" class="flex-grow flex flex-col items-center justify-center p-6 text-center fade-in">
            <div class="text-6xl mb-4">🎮</div>
            <h1 class="text-3xl font-black mb-2">Claude Code</h1>
            <h2 class="text-xl font-bold gradient-text mb-4">Skill Quest</h2>
            <p class="text-purple-300 text-sm mb-8 leading-relaxed">
                Claude Codeの知識を<br>クイズで楽しくマスターしよう！
            </p>
            <div id="title-stats" class="hidden mb-6 bg-white/10 rounded-xl p-4 w-full max-w-xs backdrop-blur">
                <div class="flex justify-between text-sm mb-2">
                    <span class="text-purple-300">レベル</span>
                    <span id="title-level" class="font-bold">Lv.1 見習い</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-purple-300">総合XP</span>
                    <span id="title-xp" class="font-bold">0 XP</span>
                </div>
            </div>
            <button onclick="showScreen('map')" class="gradient-btn text-white font-bold py-3 px-10 rounded-xl shadow-lg text-lg">
                はじめる
            </button>
            <button id="title-continue" onclick="showScreen('map')" class="hidden mt-3 text-purple-300 hover:text-white text-sm underline">
                つづきから
            </button>
        </div>

        <!-- ========== STAGE MAP ========== -->
        <div id="screen-map" class="hidden flex-grow p-4 fade-in">
            <!-- Header -->
            <div class="flex items-center justify-between mb-4">
                <div>
                    <div class="text-xs text-purple-300">レベル</div>
                    <div id="map-level" class="font-bold text-lg">Lv.1 見習い</div>
                </div>
                <div class="flex gap-2">
                    <button onclick="showScreen('profile')" class="bg-white/10 hover:bg-white/20 rounded-lg px-3 py-2 text-xs">🏆 バッジ</button>
                    <button onclick="resetGame()" class="bg-white/10 hover:bg-white/20 rounded-lg px-3 py-2 text-xs">🔄</button>
                </div>
            </div>
            <!-- XP Bar -->
            <div class="bg-white/10 rounded-full h-3 mb-1">
                <div id="map-xp-bar" class="xp-bar-fill bg-gradient-to-r from-violet-500 to-fuchsia-500 h-3 rounded-full" style="width:0%"></div>
            </div>
            <div class="flex justify-between text-xs text-purple-400 mb-6">
                <span id="map-xp-text">0 XP</span>
                <span id="map-xp-next">次のレベルまで 200 XP</span>
            </div>
            <!-- Stage Cards -->
            <div id="stage-list" class="space-y-3"></div>
        </div>

        <!-- ========== QUIZ SCREEN ========== -->
        <div id="screen-quiz" class="hidden flex-grow flex flex-col p-4 fade-in">
            <!-- Quiz Header -->
            <div class="flex items-center justify-between mb-3">
                <button onclick="confirmQuit()" class="text-purple-300 hover:text-white text-sm">← 戻る</button>
                <div id="quiz-streak" class="hidden text-sm font-bold">
                    <span class="streak-fire">🔥</span> <span id="quiz-streak-count">0</span> 連続正解
                </div>
            </div>
            <div class="flex justify-between text-xs text-purple-400 mb-2">
                <span id="quiz-stage-name">Stage 1</span>
                <span id="quiz-progress-text">1 / 5</span>
            </div>
            <div class="bg-white/10 rounded-full h-2 mb-6">
                <div id="quiz-progress-bar" class="progress-fill bg-gradient-to-r from-violet-500 to-fuchsia-500 h-2 rounded-full" style="width:0%"></div>
            </div>
            <!-- Question -->
            <div class="flex-grow flex flex-col justify-center">
                <h3 id="quiz-question" class="text-lg font-bold mb-6 leading-relaxed slide-up"></h3>
                <div id="quiz-options" class="space-y-3"></div>
            </div>
            <!-- Feedback -->
            <div id="quiz-feedback" class="hidden mt-4 rounded-xl p-4 slide-up">
                <div id="quiz-feedback-icon" class="text-2xl mb-2"></div>
                <div id="quiz-feedback-text" class="text-sm font-bold mb-2"></div>
                <div id="quiz-feedback-explain" class="text-xs leading-relaxed opacity-90"></div>
                <button id="quiz-next-btn" onclick="nextQuestion()" class="mt-4 w-full gradient-btn text-white font-bold py-2 rounded-lg text-sm">
                    次の問題へ
                </button>
            </div>
        </div>

        <!-- ========== STAGE CLEAR SCREEN ========== -->
        <div id="screen-clear" class="hidden flex-grow flex flex-col items-center justify-center p-6 text-center fade-in">
            <div id="clear-badge" class="text-6xl mb-4 pop-in"></div>
            <h2 id="clear-title" class="text-2xl font-black mb-2">ステージクリア！</h2>
            <p id="clear-subtitle" class="text-purple-300 text-sm mb-6"></p>
            <div class="bg-white/10 rounded-xl p-6 w-full max-w-xs mb-6 backdrop-blur">
                <div class="flex justify-between mb-3 text-sm">
                    <span class="text-purple-300">正解数</span>
                    <span id="clear-score" class="font-bold"></span>
                </div>
                <div class="flex justify-between mb-3 text-sm">
                    <span class="text-purple-300">獲得XP</span>
                    <span id="clear-xp" class="font-bold text-fuchsia-400"></span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-purple-300">最大ストリーク</span>
                    <span id="clear-streak" class="font-bold"></span>
                </div>
            </div>
            <div id="clear-levelup" class="hidden mb-4 bg-fuchsia-500/20 border border-fuchsia-500/50 rounded-xl p-4 w-full max-w-xs level-up-overlay">
                <div class="text-2xl mb-1">⬆️</div>
                <div class="font-bold">レベルアップ！</div>
                <div id="clear-levelup-text" class="text-sm text-fuchsia-300"></div>
            </div>
            <div id="clear-unlock" class="hidden mb-4 text-sm text-green-400 font-bold pop-in">
                🔓 次のステージが解放されました！
            </div>
            <button onclick="showScreen('map')" class="gradient-btn text-white font-bold py-3 px-10 rounded-xl shadow-lg">
                マップに戻る
            </button>
        </div>

        <!-- ========== PROFILE SCREEN ========== -->
        <div id="screen-profile" class="hidden flex-grow p-4 fade-in">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold">🏆 プロフィール</h2>
                <button onclick="showScreen('map')" class="text-purple-300 hover:text-white text-sm">← 戻る</button>
            </div>
            <div class="bg-white/10 rounded-xl p-4 mb-6 backdrop-blur">
                <div id="profile-level" class="text-lg font-bold mb-1"></div>
                <div id="profile-xp" class="text-sm text-purple-300 mb-3"></div>
                <div class="bg-white/10 rounded-full h-3 mb-1">
                    <div id="profile-xp-bar" class="xp-bar-fill bg-gradient-to-r from-violet-500 to-fuchsia-500 h-3 rounded-full" style="width:0%"></div>
                </div>
                <div id="profile-xp-detail" class="text-xs text-purple-400"></div>
            </div>
            <h3 class="font-bold mb-3">獲得バッジ</h3>
            <div id="profile-badges" class="grid grid-cols-2 gap-3 mb-6"></div>
            <h3 class="font-bold mb-3">統計</h3>
            <div id="profile-stats" class="bg-white/10 rounded-xl p-4 backdrop-blur space-y-2 text-sm"></div>
        </div>

    </div>

    <!-- Level Up Overlay -->
    <div id="overlay-levelup" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="text-center level-up-overlay">
            <div class="text-7xl mb-4">⬆️</div>
            <div class="text-3xl font-black mb-2">LEVEL UP!</div>
            <div id="overlay-levelup-text" class="text-xl font-bold gradient-text"></div>
        </div>
    </div>

    <script>
    // ========================================
    // GAME DATA
    // ========================================

    const STAGES = [

        { id: 2, name: "セットアップ & コマンド", icon: "⌨️", difficulty: 1, badge: "⌨️", badgeName: "コマンドマスター" },
        { id: 3, name: "CLAUDE.md & コンテキスト", icon: "📝", difficulty: 2, badge: "📝", badgeName: "設定ファイルの達人" },
        { id: 4, name: "MCP & Skills", icon: "🔧", difficulty: 2, badge: "🔧", badgeName: "連携マスター" },
        { id: 5, name: "Hooks & サブエージェント", icon: "🚀", difficulty: 3, badge: "🚀", badgeName: "自動化の魔術師" },

        { id: 7, name: "総合チャレンジ", icon: "👑", difficulty: 3, badge: "👑", badgeName: "Claude Code マスター" },

    const LEVELS = [
        { level: 1, name: "見習い", xp: 0 },
        { level: 2, name: "入門者", xp: 200 },
        { level: 3, name: "初心者卒業", xp: 500 },
        { level: 4, name: "実践者", xp: 900 },
        { level: 5, name: "中級者", xp: 1400 },
        { level: 6, name: "熟練者", xp: 2000 },
        { level: 7, name: "上級者", xp: 2800 },
        { level: 8, name: "エキスパート", xp: 3800 },
        { level: 9, name: "達人", xp: 5000 },
        { level: 10, name: "マスター", xp: 6500 },
    ];

    const QUESTIONS = {
        1: [
            {
                q: "Claude Codeを使う上で最も大事なマインドセットは？",
                options: ["事前にドキュメントを全部読む", "なるべくClaude Codeにやらせる", "全て手動で確認する", "コードは自分で書く"],
                answer: 1,
                explain: "Claude Codeは高速にアップデートされるため、事前学習より「使いながら学ぶ」のが最も効率的です。"
            },
            {
                q: "LLMがファイル操作やコマンド実行をできるのは、どの仕組みのおかげ？",
                options: ["プロンプトエンジニアリング", "RAG（検索拡張生成）", "Function Calling（Tool Use）", "ファインチューニング"],
                answer: 2,
                explain: "Function Calling（Tool Use）により、LLMは外部ツールを呼び出してファイル読取やコマンド実行が可能になります。"
            },
            {
                q: "「コンテキストウィンドウ」とは何を意味する？",

                answer: 1,
                explain: "コンテキストウィンドウはAIが一度に扱える情報の上限です。会話履歴・ファイル内容・ツール結果などが消費対象になります。"
            },
            {
                q: "コンテキストを消費するものに含まれないのはどれ？",
                options: ["会話履歴", "読み込んだファイル内容", "PCのCPU使用率", "外部ツールの実行結果"],
                answer: 2,
                explain: "コンテキストを消費するのは会話履歴・ファイル内容・外部ツール結果などのテキスト情報です。PCのハードウェア情報は含まれません。"
            },
            {
                q: "Claude Codeの学習アプローチとして記事が推奨しているのは？",
                options: ["公式ドキュメントを全て暗記してから使う", "他人の設定ファイルをそのままコピーする", "使いながら学ぶ実践優先のアプローチ", "LLMの仕組みを完全に理解してから使う"],
                answer: 2,
                explain: "Claude Codeはアップデートが非常に高速なため、事前に全て学ぶより使いながら実践的に学ぶのが推奨されています。"
            },
        ],
        2: [

            {

                options: ["Ctrl+P", "Shift+Tabを2回", "Tab+Enter", "Ctrl+Shift+P"],
                answer: 1,
                explain: "Shift+Tabを1回でAuto accept editsモード、2回でPlan Modeになります。Plan Modeでは分析のみ行い、実際のファイル変更は行いません。"

            {

                options: ["/history", "/back", "/resume", "/restore"],

            {

    // ========================================
    // GAME STATE
    // ========================================

    const DEFAULT_STATE = {
        xp: 0,
        stagesCleared: [],       // [stageId, ...]
        stageScores: {},         // { stageId: { score, maxStreak, xpEarned } }
        badges: [],              // [stageId, ...]
        totalCorrect: 0,
        totalAnswered: 0,
        bestStreak: 0,
    };

    let gameState = loadState();
    let currentStage = null;
    let currentQuestionIndex = 0;
    let stageCorrect = 0;
    let stageXP = 0;
    let streak = 0;
    let maxStreakThisStage = 0;
    let answered = false;

    function loadState() {
        try {
            const saved = localStorage.getItem('claude-code-skill-quest');
            return saved ? { ...DEFAULT_STATE, ...JSON.parse(saved) } : { ...DEFAULT_STATE };
        } catch { return { ...DEFAULT_STATE }; }
    }
    function saveState() {
        localStorage.setItem('claude-code-skill-quest', JSON.stringify(gameState));
    }

    // ========================================
    // LEVEL SYSTEM
    // ========================================

    function getLevel(xp) {
        let lvl = LEVELS[0];
        for (const l of LEVELS) {
            if (xp >= l.xp) lvl = l;
            else break;
        }
        return lvl;
    }
    function getNextLevel(xp) {
        const current = getLevel(xp);
        return LEVELS.find(l => l.xp > xp) || current;
    }
    function getLevelProgress(xp) {
        const current = getLevel(xp);
        const next = getNextLevel(xp);
        if (current === next) return 100;
        return ((xp - current.xp) / (next.xp - current.xp)) * 100;
    }
    function getLevelText(xp) {
        const l = getLevel(xp);
        return `Lv.${l.level} ${l.name}`;
    }

    // ========================================
    // SCREEN MANAGEMENT
    // ========================================

    function showScreen(name) {
        document.querySelectorAll('[id^="screen-"]').forEach(el => el.classList.add('hidden'));
        const screen = document.getElementById(`screen-${name}`);
        if (screen) {
            screen.classList.remove('hidden');
            screen.classList.add('fade-in');
        }

        if (name === 'title') renderTitle();
        if (name === 'map') renderMap();
        if (name === 'profile') renderProfile();
    }

    // ========================================
    // TITLE SCREEN
    // ========================================

    function renderTitle() {
        const hasProgress = gameState.xp > 0;
        const statsDiv = document.getElementById('title-stats');
        const continueBtn = document.getElementById('title-continue');

        if (hasProgress) {
            statsDiv.classList.remove('hidden');
            continueBtn.classList.remove('hidden');
            document.getElementById('title-level').textContent = getLevelText(gameState.xp);
            document.getElementById('title-xp').textContent = `${gameState.xp} XP`;
        } else {
            statsDiv.classList.add('hidden');
            continueBtn.classList.add('hidden');
        }
    }

    // ========================================
    // STAGE MAP
    // ========================================

    function renderMap() {
        document.getElementById('map-level').textContent = getLevelText(gameState.xp);
        document.getElementById('map-xp-text').textContent = `${gameState.xp} XP`;
        document.getElementById('map-xp-bar').style.width = `${getLevelProgress(gameState.xp)}%`;

        const next = getNextLevel(gameState.xp);
        const current = getLevel(gameState.xp);
        if (current.level >= 10) {
            document.getElementById('map-xp-next').textContent = 'MAX LEVEL!';
        } else {
            document.getElementById('map-xp-next').textContent = `次のレベルまで ${next.xp - gameState.xp} XP`;
        }

        const list = document.getElementById('stage-list');
        list.innerHTML = '';

        STAGES.forEach(stage => {
            const isUnlocked = isStageUnlocked(stage.id);
            const isCleared = gameState.stagesCleared.includes(stage.id);
            const score = gameState.stageScores[stage.id];
            const stars = getDifficultyStars(stage.difficulty);

            const card = document.createElement('div');
            card.className = `stage-card rounded-xl p-4 cursor-pointer ${isUnlocked ? 'bg-white/10 hover:bg-white/15' : 'bg-white/5 locked'}`;

            if (isUnlocked) {
                card.onclick = () => startStage(stage.id);
            }

            card.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="text-3xl ${isUnlocked ? '' : 'grayscale'}">${isUnlocked ? stage.icon : '🔒'}</div>
                    <div class="flex-grow">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-bold text-sm">Stage ${stage.id}</span>
                            <span class="text-xs text-purple-400">${stars}</span>
                            ${isCleared ? '<span class="text-xs bg-green-500/20 text-green-400 px-2 py-0.5 rounded-full">クリア済</span>' : ''}
                        </div>
                        <div class="text-xs ${isUnlocked ? 'text-purple-300' : 'text-purple-500'}">${stage.name}</div>
                        ${score ? `<div class="text-xs text-purple-400 mt-1">${score.score}/5 正解 | ${score.xpEarned} XP獲得</div>` : ''}
                    </div>
                    <div class="text-purple-400">${isUnlocked ? '→' : ''}</div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function isStageUnlocked(stageId) {
        if (stageId === 1) return true;
        if (stageId === 7) return gameState.stagesCleared.length >= 6;
        return gameState.stagesCleared.includes(stageId - 1);
    }

    function getDifficultyStars(d) {
        return '★'.repeat(d) + '☆'.repeat(3 - d);
    }

    // ========================================
    // QUIZ
    // ========================================

    function startStage(stageId) {
        currentStage = stageId;
        currentQuestionIndex = 0;
        stageCorrect = 0;
        stageXP = 0;
        streak = 0;
        maxStreakThisStage = 0;
        answered = false;

        showScreen('quiz');
        renderQuestion();
    }

    function renderQuestion() {
        const questions = QUESTIONS[currentStage];
        const q = questions[currentQuestionIndex];
        const stage = STAGES.find(s => s.id === currentStage);

        document.getElementById('quiz-stage-name').textContent = `${stage.icon} ${stage.name}`;
        document.getElementById('quiz-progress-text').textContent = `${currentQuestionIndex + 1} / ${questions.length}`;
        document.getElementById('quiz-progress-bar').style.width = `${(currentQuestionIndex / questions.length) * 100}%`;

        document.getElementById('quiz-question').textContent = q.q;
        document.getElementById('quiz-question').className = 'text-lg font-bold mb-6 leading-relaxed slide-up';

        // Streak display
        const streakEl = document.getElementById('quiz-streak');
        if (streak > 0) {
            streakEl.classList.remove('hidden');
            document.getElementById('quiz-streak-count').textContent = streak;
        } else {
            streakEl.classList.add('hidden');
        }

        // Options
        const container = document.getElementById('quiz-options');
        container.innerHTML = '';
        answered = false;

        const labels = ['A', 'B', 'C', 'D'];
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn w-full text-left p-4 rounded-xl bg-white/10 hover:bg-white/20 border border-white/10 text-sm leading-relaxed';
            btn.innerHTML = `<span class="font-bold text-purple-400 mr-2">${labels[i]}.</span> ${opt}`;
            btn.onclick = () => selectAnswer(i);
            container.appendChild(btn);
        });

        // Hide feedback
        document.getElementById('quiz-feedback').classList.add('hidden');
    }

    function selectAnswer(index) {
        if (answered) return;
        answered = true;

        const q = QUESTIONS[currentStage][currentQuestionIndex];
        const isCorrect = index === q.answer;

        // Visual feedback on buttons
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach((btn, i) => {
            btn.disabled = true;
            if (i === q.answer) btn.classList.add('correct');
            if (i === index && !isCorrect) btn.classList.add('wrong');
        });

        // Update stats
        let xpGained = 0;
        if (isCorrect) {
            streak++;
            if (streak > maxStreakThisStage) maxStreakThisStage = streak;
            xpGained = 100 + (streak - 1) * 20;
            stageXP += xpGained;
            stageCorrect++;
            gameState.totalCorrect++;
        } else {
            streak = 0;
        }
        gameState.totalAnswered++;

        // Show feedback
        const feedback = document.getElementById('quiz-feedback');
        feedback.classList.remove('hidden');
        feedback.className = `mt-4 rounded-xl p-4 slide-up ${isCorrect ? 'bg-green-500/20 border border-green-500/30' : 'bg-red-500/20 border border-red-500/30'}`;

        document.getElementById('quiz-feedback-icon').textContent = isCorrect ? '🎉' : '😢';
        document.getElementById('quiz-feedback-text').textContent = isCorrect
            ? `正解！ +${xpGained} XP${streak > 1 ? ` (🔥${streak}連続ボーナス!)` : ''}`
            : '不正解...';
        document.getElementById('quiz-feedback-explain').textContent = q.explain;

        const isLast = currentQuestionIndex >= QUESTIONS[currentStage].length - 1;
        document.getElementById('quiz-next-btn').textContent = isLast ? 'リザルトを見る' : '次の問題へ';

        // XP float animation
        if (isCorrect) {
            showXPFloat(xpGained);
        } else {
            // Shake question
            document.getElementById('quiz-question').classList.add('shake');
        }
    }

    function showXPFloat(xp) {
        const float = document.createElement('div');
        float.className = 'xp-float text-fuchsia-400 font-bold text-lg';
        float.textContent = `+${xp} XP`;
        float.style.right = '20px';
        float.style.top = '80px';
        document.getElementById('screen-quiz').appendChild(float);
        setTimeout(() => float.remove(), 1200);
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex >= QUESTIONS[currentStage].length) {
            finishStage();
        } else {
            renderQuestion();
        }
    }

    function finishStage() {
        const prevLevel = getLevel(gameState.xp).level;

        // Update state
        gameState.xp += stageXP;
        if (stageCorrect >= 3 && !gameState.stagesCleared.includes(currentStage)) {
            gameState.stagesCleared.push(currentStage);
        }
        if (!gameState.badges.includes(currentStage) && stageCorrect >= 3) {
            gameState.badges.push(currentStage);
        }
        if (maxStreakThisStage > gameState.bestStreak) {
            gameState.bestStreak = maxStreakThisStage;
        }
        gameState.stageScores[currentStage] = {
            score: stageCorrect,
            maxStreak: maxStreakThisStage,
            xpEarned: stageXP,
        };
        saveState();

        const newLevel = getLevel(gameState.xp).level;
        const leveledUp = newLevel > prevLevel;

        // Render clear screen
        const stage = STAGES.find(s => s.id === currentStage);
        document.getElementById('clear-badge').textContent = stageCorrect >= 3 ? stage.badge : '💪';
        document.getElementById('clear-title').textContent = stageCorrect >= 3 ? 'ステージクリア！' : 'もう少し！';
        document.getElementById('clear-subtitle').textContent = stageCorrect >= 3
            ? `「${stage.badgeName}」バッジ獲得！`
            : `3問以上正解でクリアです（${stageCorrect}/5）`;
        document.getElementById('clear-score').textContent = `${stageCorrect} / 5`;
        document.getElementById('clear-xp').textContent = `+${stageXP} XP`;
        document.getElementById('clear-streak').textContent = `${maxStreakThisStage} 連続`;

        // Level up
        const levelUpDiv = document.getElementById('clear-levelup');
        if (leveledUp) {
            levelUpDiv.classList.remove('hidden');
            document.getElementById('clear-levelup-text').textContent = getLevelText(gameState.xp);
        } else {
            levelUpDiv.classList.add('hidden');
        }

        // Unlock next
        const unlockDiv = document.getElementById('clear-unlock');
        if (stageCorrect >= 3 && currentStage < 7) {
            unlockDiv.classList.remove('hidden');
        } else {
            unlockDiv.classList.add('hidden');
        }

        showScreen('clear');

        // Confetti for clear
        if (stageCorrect >= 3) spawnConfetti();

        // Level up overlay
        if (leveledUp) {
            setTimeout(() => {
                document.getElementById('overlay-levelup-text').textContent = getLevelText(gameState.xp);
                document.getElementById('overlay-levelup').classList.remove('hidden');
                setTimeout(() => document.getElementById('overlay-levelup').classList.add('hidden'), 2500);
            }, 800);
        }
    }

    function confirmQuit() {
        if (answered || currentQuestionIndex > 0) {
            if (confirm('ステージを中断しますか？（進捗は保存されません）')) {
                showScreen('map');
            }
        } else {
            showScreen('map');
        }
    }

    // ========================================
    // PROFILE
    // ========================================

    function renderProfile() {
        document.getElementById('profile-level').textContent = getLevelText(gameState.xp);
        document.getElementById('profile-xp').textContent = `総合XP: ${gameState.xp}`;
        document.getElementById('profile-xp-bar').style.width = `${getLevelProgress(gameState.xp)}%`;

        const next = getNextLevel(gameState.xp);
        const current = getLevel(gameState.xp);
        document.getElementById('profile-xp-detail').textContent = current.level >= 10
            ? 'MAX LEVEL 到達！'
            : `${gameState.xp} / ${next.xp} XP (あと ${next.xp - gameState.xp} XP)`;

        // Badges
        const badgesDiv = document.getElementById('profile-badges');
        badgesDiv.innerHTML = '';
        STAGES.forEach(stage => {
            const earned = gameState.badges.includes(stage.id);
            const div = document.createElement('div');
            div.className = `rounded-xl p-3 text-center ${earned ? 'bg-white/10' : 'bg-white/5 opacity-40'}`;
            div.innerHTML = `
                <div class="text-2xl mb-1">${earned ? stage.badge : '❓'}</div>
                <div class="text-xs font-bold">${earned ? stage.badgeName : '???'}</div>
            `;
            badgesDiv.appendChild(div);
        });

        // Stats
        const statsDiv = document.getElementById('profile-stats');
        const accuracy = gameState.totalAnswered > 0 ? Math.round((gameState.totalCorrect / gameState.totalAnswered) * 100) : 0;
        statsDiv.innerHTML = `
            <div class="flex justify-between"><span class="text-purple-300">クリアステージ</span><span class="font-bold">${gameState.stagesCleared.length} / ${STAGES.length}</span></div>
            <div class="flex justify-between"><span class="text-purple-300">総回答数</span><span class="font-bold">${gameState.totalAnswered}</span></div>
            <div class="flex justify-between"><span class="text-purple-300">正解率</span><span class="font-bold">${accuracy}%</span></div>
            <div class="flex justify-between"><span class="text-purple-300">最高ストリーク</span><span class="font-bold">🔥 ${gameState.bestStreak}</span></div>
            <div class="flex justify-between"><span class="text-purple-300">獲得バッジ</span><span class="font-bold">${gameState.badges.length} / ${STAGES.length}</span></div>
        `;
    }

    // ========================================
    // EFFECTS
    // ========================================

    function spawnConfetti() {
        const colors = ['#a78bfa', '#c084fc', '#e879f9', '#f472b6', '#fb923c', '#34d399'];
        const container = document.createElement('div');
        container.className = 'confetti';
        container.style.left = '0';
        container.style.top = '0';
        container.style.width = '100vw';
        container.style.height = '100vh';
        document.body.appendChild(container);

        for (let i = 0; i < 40; i++) {
            const piece = document.createElement('div');
            piece.className = 'confetti-piece';
            piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            piece.style.left = `${Math.random() * 100}vw`;
            piece.style.top = `${-10 + Math.random() * 20}px`;
            piece.style.animationDelay = `${Math.random() * 0.5}s`;
            piece.style.animationDuration = `${1 + Math.random() * 1}s`;
            container.appendChild(piece);
        }
        setTimeout(() => container.remove(), 3000);
    }

    // ========================================
    // RESET
    // ========================================

    function resetGame() {
        if (confirm('全ての進捗をリセットしますか？\n（この操作は取り消せません）')) {
            localStorage.removeItem('claude-code-skill-quest');
            gameState = { ...DEFAULT_STATE };
            showScreen('title');
        }
    }

    // ========================================
    // INIT
    // ========================================

    showScreen('title');
    </script>
